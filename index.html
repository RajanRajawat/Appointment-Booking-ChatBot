<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WerqLabs Hospital — Help Desk</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #eef4fb;
      --surface:     #ffffff;
      --card:        #f5f9ff;
      --border:      #d0e4f5;
      --accent:      #1a7fd4;
      --accent-light:#e8f3fc;
      --accent-dim:  #1a7fd420;
      --green:       #0db884;
      --green-dim:   #0db88420;
      --red:         #e53e5a;
      --red-dim:     #e53e5a15;
      --text:        #1a2b3c;
      --muted:       #7a9ab5;
      --user-bg:     #1a7fd4;
      --user-text:   #ffffff;
      --bot-bg:      #ffffff;
      --radius:      14px;
      --shadow:      0 8px 40px rgba(26,127,212,0.12);
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 20% 20%, #d6eafb55 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #c8f0e555 0%, transparent 50%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .chat-container {
      width: 62%;
      height: 74vh;
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }

    .brand-icon svg { width: 18px; height: 18px; fill: #fff; }
    .brand-name { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
    .brand-sub  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-family: 'DM Mono', monospace;
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card); color: var(--muted);
      transition: all 0.3s;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); transition: background 0.3s;
    }

    .status-pill.online  { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .status-pill.online  .status-dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-pill.offline { border-color: var(--red); color: var(--red); background: var(--red-dim); }
    .status-pill.offline .status-dot { background: var(--red); box-shadow: 0 0 5px var(--red); }

    .session-config { display: flex; align-items: center; gap: 6px; }
    .session-label  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

    .session-input {
      background: var(--card); border: 1px solid var(--border); border-radius: 7px;
      color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px;
      padding: 4px 9px; width: 130px; outline: none; transition: border-color 0.2s;
    }

    .session-input:focus { border-color: var(--accent); }

    /* ── CHAT AREA ── */
    #chat-window {
      flex: 1; overflow-y: auto;
      padding: 20px 0;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
      background: var(--card);
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex; padding: 0 20px;
      animation: fadeUp 0.22s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 70%; padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 13.5px; line-height: 1.65;
    }

    .msg-row.user .bubble {
      background: var(--user-bg); color: var(--user-text);
      border-bottom-right-radius: 3px;
      box-shadow: 0 2px 10px rgba(26,127,212,0.25);
    }

    .msg-row.bot .bubble {
      background: var(--bot-bg); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .avatar {
      width: 28px; height: 28px;
      background: var(--accent-dim); border: 1.5px solid var(--accent);
      border-radius: 50%; display: grid; place-items: center;
      margin-right: 8px; flex-shrink: 0; margin-top: 2px;
    }

    .avatar svg { width: 13px; height: 13px; fill: var(--accent); }

    .typing-dots span {
      display: inline-block; width: 5px; height: 5px;
      background: var(--muted); border-radius: 50%; margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── INPUT BAR ── */
    footer {
      padding: 14px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row { display: flex; gap: 9px; align-items: flex-end; }

    #user-input {
      flex: 1; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13.5px; padding: 10px 14px;
      resize: none; outline: none; max-height: 110px;
      overflow-y: auto; line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    #user-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 42px; height: 42px; background: var(--accent);
      border: none; border-radius: 11px; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 3px 12px rgba(26,127,212,0.35);
    }

    .send-btn:hover  { opacity: 0.88; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn svg    { width: 16px; height: 16px; fill: #fff; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    .hint {
      font-size: 10.5px; color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 7px; text-align: center;
    }

    /* empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 40px; text-align: center; pointer-events: none;
    }

    .empty-icon {
      width: 52px; height: 52px;
      background: var(--accent-dim); border: 1.5px solid var(--accent);
      border-radius: 50%; display: grid; place-items: center;
    }

    .empty-icon svg { width: 24px; height: 24px; fill: var(--accent); }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .empty-sub   { font-size: 12.5px; color: var(--muted); max-width: 300px; line-height: 1.65; }

    /* credit */
    .credit {
      position: fixed; bottom: 12px; right: 18px;
      font-size: 11px; color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.2px; opacity: 0.65;
    }
  </style>
</head>
<body>

<div class="chat-container">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 3a1 1 0 0 1 1 1v3h3a1 1 0 0 1 0 2h-3v3a1 1 0 0 1-2 0v-3H8a1 1 0 0 1 0-2h3V7a1 1 0 0 1 1-1z"/></svg>
      </div>
      <div>
        <div class="brand-name">WerqLabs Hospital</div>
        <div class="brand-sub">Help Desk · AI Assistant</div>
      </div>
    </div>

    <div class="header-right">
      <div class="status-pill" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-text">checking...</span>
      </div>
      <div class="session-config">
        <span class="session-label">session_id :</span>
        <input class="session-input" id="session-id" type="text" value="test-session-01" spellcheck="false"/>
      </div>
    </div>
  </header>

  <div id="chat-window">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
      </div>
      <div class="empty-title">How can I help you today?</div>
      <div class="empty-sub">Register, book an appointment, reschedule, or ask a general health question.</div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="Type your message…"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </footer>

</div>

<div class="credit">developed by Rajan with ❤️</div>

<script>
  const API_BASE = "http://localhost:8000";
  const chatWindow = document.getElementById("chat-window");
  const emptyState = document.getElementById("empty-state");
  const input      = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const pill       = document.getElementById("status-pill");
  const statusText = document.getElementById("status-text");

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 110) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
      const data = await res.json();
      data.status === "ok" ? setOnline() : setOffline();
    } catch { setOffline(); }
  }

  function setOnline()  { pill.className = "status-pill online";  statusText.textContent = "API running"; }
  function setOffline() { pill.className = "status-pill offline"; statusText.textContent = "API offline"; }

  checkHealth();
  setInterval(checkHealth, 10000);

  function appendMsg(role, text) {
    if (emptyState) emptyState.style.display = "none";
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    if (role === "bot") {
      const av = document.createElement("div");
      av.className = "avatar";
      av.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 3a1 1 0 0 1 1 1v3h3a1 1 0 0 1 0 2h-3v3a1 1 0 0 1-2 0v-3H8a1 1 0 0 1 0-2h3V7a1 1 0 0 1 1-1z"/></svg>`;
      row.appendChild(av);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function showTyping() {
    if (emptyState) emptyState.style.display = "none";
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-indicator";

    const av = document.createElement("div");
    av.className = "avatar";
    av.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 3a1 1 0 0 1 1 1v3h3a1 1 0 0 1 0 2h-3v3a1 1 0 0 1-2 0v-3H8a1 1 0 0 1 0-2h3V7a1 1 0 0 1 1-1z"/></svg>`;

    const bubble = document.createElement("div");
    bubble.className = "bubble typing-dots";
    bubble.innerHTML = `<span></span><span></span><span></span>`;

    row.appendChild(av);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;

    const sessionId = document.getElementById("session-id").value.trim() || "default";
    appendMsg("user", msg);
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    try {
      const url = `${API_BASE}/chat?message=${encodeURIComponent(msg)}&session_id=${encodeURIComponent(sessionId)}`;
      const res  = await fetch(url);
      const data = await res.json();
      removeTyping();
      appendMsg("bot", data.reply || data.error || "Something went wrong.");
    } catch {
      removeTyping();
      appendMsg("bot", "⚠️ Could not reach the API. Make sure the server is running.");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
